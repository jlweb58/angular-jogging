@if (!isApiLoaded) {
  <div class="loading-container">
    Loading map...
  </div>
}
@if (isApiLoaded && isMapReady) {
  <google-map
    height = "100%"
    width =  "100%"
    [zoom]="zoom"
    [center]="center"
    [options]="options"
    >
    <map-polyline
      [options] = "polylineOptions"
    ></map-polyline>
  </google-map>
}
